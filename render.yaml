services:
  - type: web
    name: ai-pipes-api
    runtime: node
    buildCommand: cd server && npm install && npm run build && npx drizzle-kit push --force
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-pipes-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CLIENT_URL
        value: https://ai-pipes.onrender.com
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_STARTER_PRICE_ID
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_BUSINESS_PRICE_ID
        sync: false

  - type: web
    name: ai-pipes
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ai-pipes-api-vyqh.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ai-pipes-db
    plan: free
